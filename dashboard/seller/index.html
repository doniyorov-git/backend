<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Diller UZ - Sotuvchi Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/styles.css?v=16">
</head>

<body data-page="dashboard" data-role="seller" data-root="../..">
    <section id="app-layout" class="hidden">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo"><i class="ri-store-2-line"></i></div>
                <div>
                    <div class="sidebar-title">My Diller</div>
                    <div class="text-xs text-muted">B2B Platforma</div>
                </div>
            </div>
            <nav class="sidebar-menu" id="sidebar-menu"></nav>
        </aside>

        <main id="main-content">
            <header id="topbar">
                <div class="topbar-left">
                    <h2 id="page-title">Dashboard</h2>
                </div>
                <div class="topbar-actions">
                    <div class="notification-wrapper">
                        <button class="btn btn-outline btn-icon" onclick="toggleNotifications(event)" title="Bildirishnomalar">
                            <i class="ri-notification-3-line"></i><span id="notification-count" class="notification-count hidden">0</span>
                        </button>
                        <div class="notification-dropdown" id="notification-dropdown"></div>
                    </div>
                    <div class="profile-wrapper">
                        <button class="profile-toggle" onclick="toggleProfileMenu(event)" title="Profil">
                            <span class="hide-sm text-right">
                                <span id="topbar-user-name" class="font-bold">Foydalanuvchi</span>
                                <span id="topbar-user-role" class="text-xs text-muted">Rol</span>
                            </span>
                            <span class="avatar" id="topbar-avatar">U</span>
                            <i class="ri-arrow-down-s-line profile-caret"></i>
                        </button>
                        <div class="profile-dropdown" id="profile-dropdown"></div>
                    </div>
                </div>
            </header>
            <nav class="mobile-bottom-nav" id="mobile-bottom-nav" aria-label="Asosiy menyu"></nav>
            <div id="view-area"></div>
        </main>
    </section>

    <div class="modal-overlay" id="main-modal" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Ma'lumot</h3>
                <button class="btn btn-outline btn-icon" onclick="closeModal()"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="../../assets/js/app.js?v=17"></script>
</body>

</html>
